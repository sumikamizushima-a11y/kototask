<style>
:root {
  --bg: #fafaf9;
  --ink: #37352f;
  --ink-soft: #787672;
  --pri-50: #f7f6f3;
  --pri-100: #ebeae6;
  --pri-500: #37352f;
  --pri-600: #2f2d27;
  --gray-50: #fbfbfa;
  --gray-100: #f3f2ef;
  --gray-200: #ebeae6;
  --gray-300: #dcdad5;
  --gray-400: #b8b6b0;
  --gray-500: #9b9a95;
  --gray-600: #787672;
  --gray-700: #5a5956;
  --green-500: #68886e;
  --green-600: #4f6e56;
  --red-500: #b5544d;
  --amber-500: #a88f5c;
  --accent: #fae4d8;
  --accent-soft: rgba(250,228,216,.75);
  --accent-strong: #f0c8b1;
  --border: rgba(55,53,47,.09);
  --shadow-sm: 0 1px 2px rgba(15,15,15,.03);
  --shadow-md: 0 1px 2px rgba(15,15,15,.02), 0 2px 8px -2px rgba(15,15,15,.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; }

body {
  background: var(--gray-50);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  line-height: 1.5;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

button, input, select, textarea { font-family: inherit; color: inherit; }
button { cursor: pointer; }
input::placeholder, textarea::placeholder { color: var(--gray-400); }

/* ============ Header ============ */
header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(251,251,250,.82);
  backdrop-filter: saturate(180%) blur(14px);
  -webkit-backdrop-filter: saturate(180%) blur(14px);
  border-bottom: 1px solid var(--border);
  height: 56px;
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
}
.logo {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .06em;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-img {
  height: 40px;
  width: auto;
  display: block;
  object-fit: contain;
}
@media (max-width: 768px) {
  .logo-img { height: 34px; }
}
.logo-mark {
  width: 18px;
  height: 18px;
  border-radius: 5px;
  background: var(--ink);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0;
}
.logo-version {
  font-size: 10px;
  color: var(--gray-500);
  font-weight: 500;
  letter-spacing: 0;
}
.logo-product {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.02em;
}
.nav {
  display: flex;
  gap: 2px;
}
.nav-btn {
  background: none;
  border: none;
  padding: 7px 12px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-500);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all .15s ease;
}
.nav-btn:hover { color: var(--gray-700); background: var(--gray-100); }
.nav-btn.active {
  background: var(--gray-100);
  color: var(--ink);
  font-weight: 600;
}
.nav-btn svg { width: 14px; height: 14px; }

/* ============ Main ============ */
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
  padding-bottom: 80px;
}
.tab { display: none; }
.tab.active { display: block; }

/* ============ Tasks layout ============ */
.tasks-grid {
  display: grid;
  grid-template-columns: minmax(0, 4fr) minmax(0, 3fr);
  gap: 24px;
  align-items: start;
}
.tasks-col { min-width: 0; }
.notes-col { min-width: 0; }

/* ============ Card ============ */
.card {
  background: #fff;
  border-radius: 10px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  padding: 16px;
  margin-bottom: 12px;
}

/* ============ Hero ============ */
.hero { padding: 18px 20px; }
.hero-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.hero-date {
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.005em;
}
.view-toggle {
  display: inline-flex;
  background: var(--gray-100);
  border-radius: 7px;
  padding: 2px;
  gap: 2px;
}
.view-toggle button {
  border: none;
  background: none;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--gray-500);
  border-radius: 5px;
  transition: all .15s ease;
}
.view-toggle button.active {
  background: #fff;
  color: var(--ink);
  font-weight: 600;
  box-shadow: var(--shadow-sm);
}
.hero-numbers {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-top: 4px;
}
.hero-big {
  font-size: 28px;
  font-weight: 800;
  color: var(--ink);
  letter-spacing: -0.025em;
  line-height: 1.1;
}
.hero-total {
  font-size: 14px;
  font-weight: 500;
  color: var(--gray-500);
}
.hero-dot { color: var(--gray-300); font-size: 14px; }
.hero-pct { font-size: 14px; font-weight: 600; color: var(--gray-600); }
.hero-completed {
  margin-top: 4px;
  font-size: 12px;
  color: var(--gray-500);
}
.progress-bar {
  margin-top: 10px;
  height: 6px;
  background: var(--gray-200);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent-strong) 100%);
  border-radius: 3px;
  transition: width .4s cubic-bezier(.22,.61,.36,1);
}

/* ============ Quick add ============ */
.quick-add {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
}
.quick-add-circle {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--pri-50);
  color: var(--pri-500);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.quick-add-circle svg { width: 14px; height: 14px; }
.quick-add input {
  flex: 1;
  border: none;
  outline: none;
  background: none;
  font-size: 14px;
  min-width: 0;
}

/* ============ Buttons ============ */
.btn {
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  padding: 7px 14px;
  transition: all .15s ease;
  border: none;
  white-space: nowrap;
}
.btn-primary { background: var(--ink); color: #fff; }
.btn-primary:hover { background: var(--pri-600); }
.btn-outline {
  background: #fff;
  color: var(--gray-700);
  border: 1px solid var(--border);
}
.btn-outline:hover { background: var(--gray-100); }
.btn-danger { background: var(--red-500); color: #fff; }
.btn-danger:hover { filter: brightness(.95); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ============ Tasks section ============ */
.tasks-section { padding: 4px 6px; }
.tasks-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  cursor: pointer;
  user-select: none;
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-600);
  border-radius: 7px;
  transition: background .15s ease;
}
.tasks-section-header:hover { background: var(--gray-50); }
.tasks-section-title { display: flex; align-items: center; gap: 6px; }
.tasks-section-title svg {
  width: 12px;
  height: 12px;
  transition: transform .15s ease;
  color: var(--gray-500);
}
.tasks-section.collapsed .tasks-section-title svg { transform: rotate(-90deg); }
.tasks-section.collapsed .task-list,
.tasks-section.collapsed .inline-add { display: none; }
.tasks-section-count { font-size: 11px; color: var(--gray-500); font-weight: 500; }

.task-list { list-style: none; padding: 0; margin: 0; }
.task-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--gray-100);
  transition: background .15s ease;
  min-width: 0;
}
.task-row:last-child { border-bottom: none; }
.task-row:hover { background: var(--gray-50); }
.task-row.completed .task-title { text-decoration: line-through; color: var(--gray-400); }

.task-handle {
  color: var(--gray-300);
  cursor: grab;
  font-size: 11px;
  line-height: 1;
  user-select: none;
  flex-shrink: 0;
  letter-spacing: -2px;
}
.task-handle:active { cursor: grabbing; }

.task-check {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1.5px solid var(--gray-300);
  background: #fff;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: all .15s ease;
}
.task-check:hover { border-color: var(--gray-500); }
.task-check svg { display: none; width: 10px; height: 10px; color: #fff; }
.task-check.checked {
  background: var(--green-500);
  border-color: var(--green-500);
}
.task-check.checked:hover { background: var(--green-600); border-color: var(--green-600); }
.task-check.checked svg { display: block; }

.task-title {
  flex: 1;
  font-size: 13px;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
  cursor: text;
}
.task-title-input {
  flex: 1;
  font-size: 13px;
  border: 1px solid var(--gray-300);
  border-radius: 5px;
  padding: 3px 7px;
  outline: none;
  min-width: 0;
  background: #fff;
}
.task-title-input:focus { border-color: var(--gray-500); }

.tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  border-radius: 4px;
  padding: 2px 6px;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}

.hours-tag {
  background: var(--gray-100);
  color: var(--gray-700);
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 11px;
  font-weight: 700;
  border: none;
  flex-shrink: 0;
  transition: background .15s ease;
}
.hours-tag:hover { background: var(--gray-200); }

.hours-select {
  background: var(--gray-100);
  color: var(--gray-700);
  border-radius: 20px;
  padding: 2px 6px;
  font-size: 11px;
  font-weight: 700;
  border: none;
  outline: none;
  flex-shrink: 0;
}

.status-tag {
  display: inline-flex;
  align-items: center;
  font-size: 10px;
  font-weight: 600;
  border-radius: 4px;
  padding: 2px 6px;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.02em;
  border: none;
  transition: all .15s ease;
  background: transparent;
  color: var(--gray-300);
  font-family: inherit;
}
.status-tag:hover {
  background: var(--gray-100);
  color: var(--gray-700);
}
.status-tag.set:hover { filter: brightness(0.95); }
.status-select {
  border: 1px solid var(--gray-200);
  border-radius: 4px;
  padding: 1px 4px;
  font-size: 10px;
  font-weight: 600;
  background: #fff;
  outline: none;
  flex-shrink: 0;
  font-family: inherit;
}

.task-delete {
  width: 24px;
  height: 24px;
  border: none;
  background: none;
  color: var(--gray-400);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all .15s ease;
  padding: 0;
  opacity: 0;
}
.task-row:hover .task-delete { opacity: 1; }
.task-delete:hover { background: rgba(181,84,77,.1); color: var(--red-500); }
.task-delete svg { width: 12px; height: 12px; }

.task-empty {
  padding: 28px 14px;
  text-align: center;
  color: var(--gray-400);
  font-size: 12px;
}

/* Inline add row */
.inline-add { padding: 6px 14px 8px; }
.inline-add-input {
  width: 100%;
  border: none;
  outline: none;
  background: none;
  font-size: 13px;
  color: var(--gray-500);
  padding: 4px 0;
}
.inline-add-input:focus { color: var(--ink); }

/* ============ Timeline ============ */
.timeline { padding: 8px 4px 4px; }
.timeline-grid {
  position: relative;
  min-height: 670px;
}
.timeline-hour {
  position: absolute;
  left: 0;
  width: 50px;
  font-size: 11px;
  color: var(--gray-400);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}
.timeline-line {
  position: absolute;
  left: 50px;
  right: 6px;
  height: 1px;
  background: var(--gray-100);
}
.timeline-task {
  position: absolute;
  left: 58px;
  right: 6px;
  background: var(--ink);
  color: #fff;
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 2px;
  transition: all .15s ease;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
}
.timeline-task:hover { background: var(--pri-600); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.timeline-task.completed { background: var(--green-500); }
.timeline-task.completed:hover { background: var(--green-600); }
.timeline-task-title {
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.timeline-task-meta {
  font-size: 10px;
  opacity: .8;
  font-weight: 500;
}
.timeline-empty {
  text-align: center;
  padding: 60px 16px;
  color: var(--gray-400);
  font-size: 12px;
  line-height: 1.7;
}

/* ============ Notes panel ============ */
.notes-panel {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  position: sticky;
  top: 72px;
  max-height: calc(100vh - 90px);
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-sm);
}
.notes-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--gray-100);
}
.notes-title { font-size: 13px; font-weight: 700; color: var(--ink); }
.notes-count { font-size: 11px; color: var(--gray-500); font-weight: 500; }
.notes-add {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}
.notes-add textarea {
  border: 1px solid var(--gray-200);
  border-radius: 7px;
  padding: 8px 10px;
  font-size: 12px;
  resize: none;
  outline: none;
  min-height: 56px;
  transition: all .15s ease;
  background: var(--gray-50);
}
.notes-add textarea:focus { border-color: var(--gray-400); background: #fff; }
.notes-add-row { display: flex; gap: 8px; align-items: center; }
.notes-add select {
  flex: 1;
  border: 1px solid var(--gray-200);
  border-radius: 7px;
  padding: 6px 8px;
  font-size: 12px;
  background: #fff;
  outline: none;
  min-width: 0;
}
.notes-add button { padding: 6px 12px; font-size: 12px; }

.notes-list {
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 0;
  margin-right: -4px;
  padding-right: 4px;
}
.notes-list::-webkit-scrollbar { width: 6px; }
.notes-list::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }
.note-card {
  padding: 8px 10px;
  border: 1px solid var(--gray-100);
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  transition: all .15s ease;
}
.note-card:hover { background: var(--gray-50); border-color: var(--gray-200); }
.note-card.expanded {
  background: var(--gray-50);
  border-color: var(--gray-200);
  cursor: default;
}
.note-preview {
  font-size: 12px;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.45;
}
.note-card.expanded .note-preview { display: none; }
.note-expanded { display: none; flex-direction: column; gap: 8px; margin-bottom: 8px; }
.note-card.expanded .note-expanded { display: flex; }
.note-edit {
  width: 100%;
  border: 1px solid var(--gray-300);
  border-radius: 6px;
  padding: 7px 9px;
  font-size: 12px;
  resize: vertical;
  min-height: 80px;
  outline: none;
  background: #fff;
}
.note-edit:focus { border-color: var(--gray-500); }
.note-edit-actions { display: flex; gap: 6px; justify-content: flex-end; }
.note-edit-actions button { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
.note-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}
.note-date {
  font-size: 10px;
  color: var(--gray-400);
  margin-left: auto;
  font-variant-numeric: tabular-nums;
}
.note-to-task-btn {
  border: 1px solid var(--gray-200);
  background: #fff;
  font-size: 10px;
  color: var(--gray-600);
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 7px;
  border-radius: 12px;
  transition: all .15s ease;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.note-to-task-btn:hover {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}
.note-to-task-btn svg { width: 9px; height: 9px; }
.notes-empty {
  text-align: center;
  padding: 28px 8px;
  color: var(--gray-400);
  font-size: 12px;
}

/* ============ Calendar ============ */
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding: 4px;
  flex-wrap: wrap;
  gap: 8px;
}
.cal-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.cal-nav { display: flex; gap: 6px; align-items: center; }
.cal-nav-btn {
  width: 30px;
  height: 30px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gray-700);
  transition: background .15s ease;
}
.cal-nav-btn:hover { background: var(--gray-100); }
.cal-nav-btn svg { width: 13px; height: 13px; }
.cal-today-btn {
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  background: #fff;
  border: 1px solid var(--border);
  color: var(--gray-700);
  border-radius: 7px;
  transition: background .15s ease;
}
.cal-today-btn:hover { background: var(--gray-100); }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--gray-100);
  border: 1px solid var(--gray-100);
  border-radius: 10px;
  overflow: hidden;
}
.cal-dow {
  background: #fff;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-500);
  padding: 8px 0;
  letter-spacing: 0.04em;
}
.cal-dow.sun { color: #b56a6a; }
.cal-dow.sat { color: #5683b0; }

.cal-cell {
  aspect-ratio: 1 / 1;
  background: #fff;
  padding: 6px;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: background .12s ease;
  min-height: 76px;
  position: relative;
}
.cal-cell:hover { background: var(--gray-50); }
.cal-cell.today { background: var(--pri-50); }
.cal-cell.today:hover { background: var(--pri-100); }
.cal-cell.other-month .cal-cell-num { color: var(--gray-300); }
.cal-cell.selected { background: var(--gray-100); box-shadow: inset 0 0 0 1.5px var(--ink); }
.cal-cell-num {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.cal-cell-count { font-size: 10px; color: var(--gray-500); margin-top: 2px; }
.cal-cell-dots {
  margin-top: auto;
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
}
.cal-cell-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--green-500);
}

.cal-day-panel { margin-top: 4px; }
.cal-day-panel-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 12px;
  border-top: 1px solid var(--gray-100);
  padding: 16px 4px 0;
}
.cal-day-panel-title { font-size: 14px; font-weight: 700; }
.cal-day-panel-meta { font-size: 12px; color: var(--gray-600); font-weight: 500; }
.cal-day-panel-empty {
  text-align: center;
  color: var(--gray-400);
  font-size: 12px;
  padding: 16px;
}
.cal-day-list {
  border: 1px solid var(--gray-100);
  border-radius: 8px;
  list-style: none;
  padding: 0;
  margin: 0;
}

/* ============ Settings ============ */
.settings-card-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 14px;
  color: var(--ink);
}
.settings-list { list-style: none; margin-bottom: 8px; }
.settings-list li {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 4px;
  border-bottom: 1px solid var(--gray-100);
}
.settings-list li:last-child { border-bottom: none; }
.settings-list-color {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 1px solid rgba(0,0,0,0.06);
}
.settings-list-label { flex: 1; font-size: 13px; color: var(--ink); }
.settings-list-delete {
  border: none;
  background: none;
  color: var(--gray-400);
  padding: 5px;
  border-radius: 5px;
  transition: all .15s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}
.settings-list-delete:hover { color: var(--red-500); background: rgba(181,84,77,.08); }
.settings-list-delete svg { width: 13px; height: 13px; }
.settings-empty { color: var(--gray-400); font-size: 12px; padding: 8px 4px; }

.settings-add {
  display: flex;
  gap: 8px;
  padding-top: 12px;
  border-top: 1px solid var(--gray-100);
  align-items: center;
  margin-top: 4px;
}
.settings-add input[type=text] {
  flex: 1;
  border: 1px solid var(--gray-200);
  border-radius: 7px;
  padding: 7px 10px;
  font-size: 13px;
  outline: none;
  min-width: 0;
  background: var(--gray-50);
}
.settings-add input[type=text]:focus { border-color: var(--gray-400); background: #fff; }
.settings-add input[type=color] {
  width: 34px;
  height: 34px;
  border: 1px solid var(--gray-200);
  border-radius: 7px;
  padding: 2px;
  background: #fff;
  flex-shrink: 0;
  cursor: pointer;
}

.settings-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.settings-stat {
  background: var(--gray-50);
  border-radius: 8px;
  padding: 14px 8px;
  text-align: center;
}
.settings-stat-num {
  font-size: 22px;
  font-weight: 800;
  color: var(--ink);
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.settings-stat-label {
  font-size: 11px;
  color: var(--gray-500);
  margin-top: 2px;
}

/* ============ Modal ============ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,15,15,.40);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open {
  display: flex;
  animation: overlayIn .18s ease;
}
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: #fff;
  border-radius: 14px;
  width: 100%;
  max-width: 460px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 18px 60px rgba(0,0,0,.22);
  overflow: hidden;
  animation: modalIn .22s cubic-bezier(.22,.61,.36,1);
}
@keyframes modalIn { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--gray-100);
}
.modal-title { font-size: 15px; font-weight: 700; color: var(--ink); }
.modal-close {
  width: 28px;
  height: 28px;
  border: none;
  background: none;
  border-radius: 6px;
  color: var(--gray-500);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s ease;
}
.modal-close:hover { background: var(--gray-100); color: var(--ink); }
.modal-close svg { width: 14px; height: 14px; }
.modal-body { padding: 16px 20px; overflow-y: auto; }
.modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--gray-100);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  background: var(--gray-50);
}
.modal-summary {
  font-size: 13px;
  color: var(--gray-600);
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--gray-100);
  font-weight: 500;
}
.modal-task-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--gray-100);
  font-size: 13px;
}
.modal-task-row:last-child { border-bottom: none; }
.modal-task-status {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1.5px solid var(--gray-300);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-task-status svg { display: none; width: 10px; height: 10px; color: #fff; }
.modal-task-status.done {
  background: var(--green-500);
  border-color: var(--green-500);
}
.modal-task-status.done svg { display: block; }
.modal-task-title {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.modal-task-title.done { text-decoration: line-through; color: var(--gray-400); }
.modal-task-hours {
  font-size: 11px;
  color: var(--gray-500);
  font-weight: 600;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.modal-task-action {
  font-size: 11px;
  padding: 3px 9px;
  border: 1px solid var(--border);
  background: #fff;
  border-radius: 5px;
  color: var(--gray-700);
  transition: background .15s ease;
  flex-shrink: 0;
}
.modal-task-action:hover { background: var(--gray-100); }

/* ============ Animations ============ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}
.task-row.new { animation: fadeIn 200ms ease; }

/* ============ Notion Inbox ============ */
.inbox-card {
  padding: 14px 16px;
  background: linear-gradient(180deg, rgba(250,228,216,.18) 0%, #fff 60%);
  border: 1px solid var(--border);
}
.inbox-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.inbox-title {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
}
.inbox-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 22px;
  padding: 0 6px;
  border-radius: 11px;
  background: var(--ink);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
}
.inbox-sub {
  font-size: 11px;
  color: var(--gray-500);
  margin-bottom: 8px;
}
.inbox-list { list-style: none; padding: 0; margin: 0; }
.inbox-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 4px;
  border-bottom: 1px solid var(--gray-100);
}
.inbox-item:last-child { border-bottom: none; }
.inbox-item-main { flex: 1; min-width: 0; }
.inbox-item-title {
  font-size: 13px;
  color: var(--ink);
  font-weight: 500;
  line-height: 1.4;
  word-break: break-word;
}
.inbox-item-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 5px;
}
.inbox-priority {
  font-size: 10px;
  color: #d76b66;
  font-weight: 700;
  letter-spacing: -1px;
}
.inbox-due {
  font-size: 10px;
  color: var(--gray-600);
  background: var(--gray-100);
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 600;
}
.inbox-link {
  font-size: 12px;
  color: var(--gray-500);
  text-decoration: none;
  padding: 2px 4px;
  border-radius: 3px;
}
.inbox-link:hover { color: var(--ink); background: var(--gray-100); }
.inbox-item-actions {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
}
.inbox-item-actions .btn-sm { padding: 4px 10px; font-size: 11px; }

/* ============ Notion sync card ============ */
.notion-status {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 999px;
  letter-spacing: 0.04em;
}
.notion-status.on  { background: rgba(104,136,110,.14); color: var(--green-600); }
.notion-status.off { background: var(--gray-100); color: var(--gray-500); }
.notion-fields { display: flex; flex-direction: column; gap: 10px; }
.notion-field { display: flex; flex-direction: column; gap: 4px; }
.notion-field > label {
  font-size: 10px;
  font-weight: 700;
  color: var(--gray-500);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.notion-field input[type=text],
.notion-field input[type=password] {
  border: 1px solid var(--gray-200);
  border-radius: 7px;
  padding: 7px 10px;
  font-size: 12px;
  background: var(--gray-50);
  outline: none;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  transition: all .15s ease;
}
.notion-field input:focus { border-color: var(--gray-400); background: #fff; }
.notion-field-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
  gap: 8px;
  flex-wrap: wrap;
}
.notion-tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 9px;
  font-weight: 700;
  background: rgba(55,53,47,.06);
  color: var(--gray-700);
  padding: 1px 5px;
  border-radius: 4px;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.notion-tag.mention { background: rgba(168,143,92,.16); color: #8c7340; }
.notion-tag.task    { background: rgba(99,102,241,.13); color: #4f51d8; }

/* ============ Templates ============ */
.templates-quick {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 0 0 12px;
  flex-wrap: wrap;
  padding: 0 4px;
}
.templates-quick-label {
  font-size: 11px;
  color: var(--gray-500);
  font-weight: 600;
  letter-spacing: 0.04em;
}
.template-chip {
  border: 1px solid var(--border);
  background: #fff;
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-700);
  padding: 4px 11px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: all .15s ease;
}
.template-chip:hover {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}
.template-chip svg { width: 9px; height: 9px; }

.template-list { list-style: none; margin-bottom: 12px; }
.template-list li {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 4px;
  border-bottom: 1px solid var(--gray-100);
  flex-wrap: wrap;
}
.template-list li:last-child { border-bottom: none; }
.template-info { flex: 1; min-width: 0; }
.template-name { font-size: 13px; font-weight: 600; color: var(--ink); }
.template-meta { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
.template-actions { display: flex; gap: 4px; flex-shrink: 0; }
.template-actions button {
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--gray-700);
  font-weight: 500;
  transition: all .15s ease;
}
.template-actions button:hover { background: var(--gray-100); }
.template-actions button.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
.template-actions button.primary:hover { background: var(--pri-600); }
.template-actions button.danger:hover { background: rgba(181,84,77,.08); color: var(--red-500); border-color: rgba(181,84,77,.2); }
.template-actions button:disabled { opacity: .4; cursor: not-allowed; }
.template-actions button:disabled:hover { background: var(--ink); }

/* Toggle switch */
.switch {
  position: relative;
  display: inline-block;
  width: 32px;
  height: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
.switch input { opacity: 0; width: 0; height: 0; }
.switch-slider {
  position: absolute;
  inset: 0;
  background: var(--gray-300);
  border-radius: 18px;
  transition: all .2s ease;
}
.switch-slider::before {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  background: #fff;
  border-radius: 50%;
  transition: all .2s ease;
  box-shadow: 0 1px 2px rgba(0,0,0,.18);
}
.switch input:checked + .switch-slider { background: var(--green-500); }
.switch input:checked + .switch-slider::before { transform: translateX(14px); }

/* Weekday pills */
.weekday-pills { display: inline-flex; gap: 3px; flex-wrap: wrap; }
.weekday-pill {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 1px solid var(--gray-200);
  background: #fff;
  color: var(--gray-500);
  font-size: 10px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .15s ease;
  flex-shrink: 0;
  padding: 0;
}
.weekday-pill:hover { border-color: var(--gray-400); color: var(--gray-700); }
.weekday-pill[data-dow="0"] { color: #b56a6a; }
.weekday-pill[data-dow="6"] { color: #5683b0; }
.weekday-pill.active {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}
.weekday-pill.active[data-dow="0"] { background: #b56a6a; border-color: #b56a6a; color: #fff; }
.weekday-pill.active[data-dow="6"] { background: #5683b0; border-color: #5683b0; color: #fff; }

.weekday-presets { display: inline-flex; gap: 4px; margin-left: 8px; flex-wrap: wrap; }
.weekday-preset {
  font-size: 10px;
  padding: 3px 8px;
  height: 24px;
  border-radius: 999px;
  border: 1px solid var(--gray-200);
  background: #fff;
  color: var(--gray-600);
  cursor: pointer;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  transition: all .15s ease;
}
.weekday-preset:hover { background: var(--gray-100); color: var(--ink); border-color: var(--gray-300); }

/* Template task card in editor */
.tmpl-task-card {
  padding: 8px 10px;
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  background: var(--gray-50);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.tmpl-task-top {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  min-width: 0;
}
.tmpl-task-top .tmpl-task-title-input {
  flex: 1 1 100%;
  min-width: 0;
}
@media (min-width: 420px) {
  .tmpl-task-top .tmpl-task-title-input { flex: 1 1 auto; }
}
.tmpl-task-days {
  display: flex;
  gap: 4px;
  align-items: center;
  flex-wrap: wrap;
  padding-left: 2px;
}
.tmpl-task-days-label {
  font-size: 10px;
  color: var(--gray-500);
  font-weight: 600;
  margin-right: 4px;
  letter-spacing: 0.04em;
}

/* Enabled toggle in editor */
.editor-enabled-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--gray-50);
  border-radius: 8px;
  margin-bottom: 16px;
}
.editor-enabled-row .text { flex: 1; }
.editor-enabled-row .title { font-size: 13px; font-weight: 600; }
.editor-enabled-row .sub { font-size: 11px; color: var(--gray-500); margin-top: 2px; }

.modal-wide { max-width: 540px; }
.form-row { margin-bottom: 16px; }
.form-row > label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  color: var(--gray-500);
  margin-bottom: 6px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.form-input, .form-select {
  width: 100%;
  border: 1px solid var(--gray-200);
  border-radius: 7px;
  padding: 8px 10px;
  font-size: 13px;
  background: var(--gray-50);
  outline: none;
  transition: all .15s ease;
}
.form-input:focus, .form-select:focus { border-color: var(--gray-400); background: #fff; }
.schedule-controls { display: flex; gap: 8px; flex-wrap: wrap; }
.schedule-controls > select {
  flex: 1;
  min-width: 140px;
  border: 1px solid var(--gray-200);
  border-radius: 7px;
  padding: 8px 10px;
  font-size: 13px;
  background: var(--gray-50);
  outline: none;
}
.schedule-controls > select:focus { border-color: var(--gray-400); background: #fff; }

.tmpl-tasks { display: flex; flex-direction: column; gap: 6px; }
.tmpl-task-row { display: flex; gap: 6px; align-items: center; }
.tmpl-task-row input[type=text] {
  flex: 1;
  min-width: 0;
  border: 1px solid var(--gray-200);
  border-radius: 6px;
  padding: 7px 9px;
  font-size: 13px;
  background: var(--gray-50);
  outline: none;
  transition: all .15s ease;
}
.tmpl-task-row input[type=text]:focus { background: #fff; border-color: var(--gray-400); }
.tmpl-task-row select {
  border: 1px solid var(--gray-200);
  border-radius: 6px;
  padding: 7px 6px;
  font-size: 12px;
  background: #fff;
  outline: none;
  flex-shrink: 0;
  font-weight: 600;
}
.tmpl-task-del {
  width: 28px;
  height: 28px;
  border: none;
  background: none;
  color: var(--gray-400);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all .15s ease;
}
.tmpl-task-del:hover { background: rgba(181,84,77,.08); color: var(--red-500); }
.tmpl-task-del svg { width: 12px; height: 12px; }
.tmpl-add-task {
  margin-top: 4px;
  align-self: flex-start;
  border: 1px dashed var(--gray-300);
  background: none;
  color: var(--gray-600);
  padding: 6px 12px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 500;
  transition: all .15s ease;
}
.tmpl-add-task:hover { background: var(--gray-50); color: var(--ink); border-color: var(--gray-400); }

/* ============ Auth overlay ============ */
.auth-overlay {
  position: fixed;
  inset: 0;
  background: rgba(250, 228, 216, .55);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.auth-overlay.open { display: flex; animation: overlayIn .22s ease; }
.auth-card {
  background: #fff;
  border-radius: 16px;
  padding: 32px 28px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 18px 60px rgba(0,0,0,.18);
  display: flex;
  flex-direction: column;
  align-items: stretch;
  text-align: center;
}
.auth-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  margin-top: 4px;
}
.auth-sub {
  font-size: 12px;
  color: var(--gray-600);
  margin-top: 6px;
  margin-bottom: 22px;
  line-height: 1.6;
}
.auth-btn {
  width: 100%;
  padding: 11px;
  margin-top: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  border-radius: 8px;
}
.auth-divider {
  position: relative;
  margin: 16px 0 8px;
  text-align: center;
  font-size: 11px;
  color: var(--gray-400);
}
.auth-divider::before, .auth-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 30%;
  height: 1px;
  background: var(--gray-200);
}
.auth-divider::before { left: 0; }
.auth-divider::after { right: 0; }
.auth-divider span { background: #fff; padding: 0 8px; }
.auth-input {
  width: 100%;
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  background: var(--gray-50);
  outline: none;
  font-family: inherit;
  margin-top: 4px;
}
.auth-input:focus { border-color: var(--gray-400); background: #fff; }
.auth-note {
  font-size: 10px;
  color: var(--gray-500);
  margin-top: 14px;
  line-height: 1.6;
}

.auth-badge {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--ink);
  color: #fff;
  border: none;
  font-size: 12px;
  font-weight: 700;
  display: none;
  align-items: center;
  justify-content: center;
  margin-left: 8px;
  cursor: pointer;
  transition: opacity .15s ease;
}
.auth-badge:hover { opacity: 0.85; }

/* ============ Toast ============ */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--ink);
  color: #fff;
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all .22s cubic-bezier(.22,.61,.36,1);
  z-index: 200;
  box-shadow: 0 10px 28px rgba(0,0,0,.22);
  pointer-events: none;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast svg { width: 13px; height: 13px; color: #8fcf95; }
@media (max-width: 768px) {
  .toast { bottom: 80px; }
}

/* ============ Mobile ============ */
@media (max-width: 900px) {
  .tasks-grid { grid-template-columns: 1fr; gap: 16px; }
  .notes-panel { position: static; max-height: none; }
  .notes-list { max-height: 400px; }
}
@media (max-width: 768px) {
  main { padding: 16px; padding-bottom: 90px; }
  header { height: 52px; }
  .header-inner { padding: 0 16px; }
  .nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(251,251,250,.92);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-top: 1px solid var(--border);
    padding: 8px 12px;
    padding-bottom: calc(8px + env(safe-area-inset-bottom));
    z-index: 50;
    justify-content: space-around;
    gap: 0;
  }
  .nav-btn {
    flex-direction: column;
    gap: 2px;
    padding: 6px 14px;
    font-size: 10px;
    flex: 1;
    justify-content: center;
    border-radius: 8px;
  }
  .nav-btn svg { width: 18px; height: 18px; }
  .cal-cell { min-height: 52px; padding: 5px; }
  .cal-cell-num { font-size: 12px; }
  .cal-cell-count { font-size: 9px; }
  .cal-cell-dot { width: 4px; height: 4px; }
}
@media (max-width: 480px) {
  main { padding: 12px; padding-bottom: 88px; }
  .hero { padding: 16px; }
  .hero-big { font-size: 24px; }
  .task-row { padding: 10px 10px; gap: 8px; }
  .task-row .tag { font-size: 9px; padding: 1px 5px; }
  .hours-tag { padding: 2px 8px; font-size: 10px; }
  .task-delete { opacity: 1; }
  .quick-add { padding: 10px; }
  .card { padding: 14px; }
  .settings-stat-num { font-size: 18px; }
  .cal-cell { min-height: 44px; padding: 4px; }
}
</style>
</head>

<script>
/* ============ Utilities ============ */
const $ = (s, p=document) => p.querySelector(s);
const $$ = (s, p=document) => Array.from(p.querySelectorAll(s));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
const fmt = n => {
  const x = Number(n) || 0;
  return Number.isInteger(x) ? String(x) : x.toFixed(1);
};
const isoDate = d => {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
};
const parseISO = s => {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
};
const todayISO = () => isoDate(new Date());
const DAY_LABELS = ['日','月','火','水','木','金','土'];
const formatDateJP = iso => {
  const d = parseISO(iso);
  return `${d.getMonth()+1}/${d.getDate()}（${DAY_LABELS[d.getDay()]}）`;
};
const escapeHTML = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const alphaHex = (hex, a='20') => (hex || '#9b9a95') + a;

let _toastTimer = null;
function showToast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg><span>${escapeHTML(msg)}</span>`;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  _toastTimer = setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 240);
    _toastTimer = null;
  }, 1800);
}

function migrateTemplates() {
  let changed = false;
  state.templates.forEach(tmpl => {
    if (typeof tmpl.enabled !== 'boolean') { tmpl.enabled = true; changed = true; }
    // Convert legacy template-level schedule into per-task weekdays
    let legacyWeekdays = null;
    if (tmpl.schedule) {
      switch (tmpl.schedule) {
        case 'daily':    legacyWeekdays = [0,1,2,3,4,5,6]; break;
        case 'weekdays': legacyWeekdays = [1,2,3,4,5]; break;
        case 'weekly':   legacyWeekdays = [Number(tmpl.scheduleWeekday)||0]; break;
        case 'monthly':
        case 'manual':
        default:         legacyWeekdays = []; break;
      }
      delete tmpl.schedule;
      delete tmpl.scheduleWeekday;
      delete tmpl.scheduleDay;
      delete tmpl.lastApplied;
      changed = true;
    }
    (tmpl.tasks || []).forEach(t => {
      if (!Array.isArray(t.weekdays)) { t.weekdays = legacyWeekdays ? legacyWeekdays.slice() : []; changed = true; }
      if (!('lastApplied' in t)) { t.lastApplied = null; changed = true; }
    });
  });
  if (changed) persistTemplates();
}

const futureDates = () => {
  const today = todayISO();
  const dates = new Set();
  state.tasks.forEach(t => { if (t.scheduledDate && t.scheduledDate > today) dates.add(t.scheduledDate); });
  return Array.from(dates).sort();
};
function nextOrder(iso) {
  const arr = iso ? tasksOnDate(iso) : somedayTasks();
  return arr.length ? Math.max(...arr.map(t => t.order||0)) + 1 : 0;
}

/* ============ Templates ============ */
const DAY_SHORT = ['日','月','火','水','木','金','土'];

function weekdaysLabel(weekdays) {
  if (!weekdays || !weekdays.length) return '手動のみ';
  const sorted = weekdays.slice().sort((a,b) => a - b);
  if (sorted.length === 7) return '毎日';
  if (sorted.length === 5 && sorted.join(',') === '1,2,3,4,5') return '平日（月〜金）';
  if (sorted.length === 2 && sorted.join(',') === '0,6') return '週末';
  return sorted.map(d => DAY_SHORT[d]).join('・');
}

function templateSummary(tmpl) {
  const auto = (tmpl.tasks || []).filter(t => Array.isArray(t.weekdays) && t.weekdays.length).length;
  const total = (tmpl.tasks || []).length;
  if (!tmpl.enabled) return `${total}タスク ・ オフ`;
  if (auto === 0) return `${total}タスク ・ 手動のみ`;
  return `${total}タスク ・ 自動 ${auto}件`;
}

function applyTemplate(tmpl, dateISO, { autoOnly = false } = {}) {
  let count = 0;
  const dow = parseISO(dateISO).getDay();
  tmpl.tasks.forEach(t => {
    if (!t.title || !t.title.trim()) return;
    if (autoOnly) {
      if (!Array.isArray(t.weekdays) || !t.weekdays.length) return;
      if (!t.weekdays.includes(dow)) return;
      if (t.lastApplied === dateISO) return;
    }
    addTask({
      title: t.title.trim(),
      estimatedHours: Number(t.estimatedHours) || 1,
      workType: t.workType || null,
      projectId: t.projectId || null,
      scheduledDate: dateISO,
    });
    t.lastApplied = dateISO;
    count++;
  });
  if (count > 0) persistTemplates();
  return count;
}
/* ============ Notion sync ============ */
function importNotionJSON(text) {
  let data;
  try {
    data = JSON.parse(text);
  } catch (e) {
    showToast('JSON の形式が不正です');
    return { ok: false };
  }

  let addedToInbox = 0;
  let alreadyInTasks = 0;
  let alreadyInInbox = 0;

  // Helper: existing keys for dedup
  const inTaskById = new Set(state.tasks.map(t => t.notionPageId).filter(Boolean));
  const inTaskByBlock = new Set(state.tasks.map(t => t.notionBlockId).filter(Boolean));
  const inInboxById = new Set(state.notionInbox.map(i => i.notionPageId).filter(Boolean));
  const inInboxByBlock = new Set(state.notionInbox.map(i => i.notionBlockId).filter(Boolean));

  for (const nt of (data.tasks || [])) {
    if (!nt.notionPageId || !nt.title) continue;
    if (inTaskById.has(nt.notionPageId)) { alreadyInTasks++; continue; }
    if (inInboxById.has(nt.notionPageId)) { alreadyInInbox++; continue; }
    if (nt.completed) continue; // skip completed
    state.notionInbox.push({
      id: uid(),
      kind: 'task',
      title: nt.title,
      notionPageId: nt.notionPageId,
      url: nt.url || nt.notionUrl || null,
      dueDate: nt.dueDate || null,
      estimatedHours: Number(nt.estimatedHours) || 1,
      priority: nt.priority || null,
      project: nt.project || null,
      status: nt.status || null,
      addedAt: new Date().toISOString(),
    });
    addedToInbox++;
  }

  for (const m of (data.mentions || [])) {
    if (!m.notionBlockId || !(m.text || m.title)) continue;
    if (inTaskByBlock.has(m.notionBlockId)) { alreadyInTasks++; continue; }
    if (inInboxByBlock.has(m.notionBlockId)) { alreadyInInbox++; continue; }
    if (m.completed) continue;
    const txt = m.text || m.title;
    state.notionInbox.push({
      id: uid(),
      kind: 'mention',
      title: txt.length > 100 ? txt.slice(0, 100) + '…' : txt,
      notionBlockId: m.notionBlockId,
      notionPageId: m.notionPageId || null,
      url: m.pageUrl || m.url || null,
      pageTitle: m.pageTitle || null,
      estimatedHours: 0.5,
      addedAt: new Date().toISOString(),
    });
    addedToInbox++;
  }

  persistNotionInbox();
  renderActiveTab();

  if (addedToInbox === 0) {
    showToast(`新しい取り込みなし（既存${alreadyInTasks + alreadyInInbox}件）`);
  } else {
    showToast(`Notion インボックスに ${addedToInbox} 件追加`);
  }
  return { ok: true, addedToInbox, alreadyInTasks, alreadyInInbox };
}

/* Inbox helpers — pick item to today / remove */
function pickInboxItem(itemId) {
  const idx = state.notionInbox.findIndex(i => i.id === itemId);
  if (idx < 0) return;
  const item = state.notionInbox[idx];
  const today = todayISO();
  const newId = addTask({
    title: item.title,
    scheduledDate: item.dueDate || today,
    estimatedHours: item.estimatedHours || 1,
  });
  const t = state.tasks.find(x => x.id === newId);
  if (t) {
    if (item.notionPageId) t.notionPageId = item.notionPageId;
    if (item.notionBlockId) t.notionBlockId = item.notionBlockId;
    if (item.url) t.notionUrl = item.url;
    if (item.pageTitle) t.notionPageTitle = item.pageTitle;
    t.notionSource = item.kind === 'mention' ? 'mention' : 'task';
  }
  state.notionInbox.splice(idx, 1);
  persistTasks();
  persistNotionInbox();
  state.justAddedId = newId;
  showToast(`「${item.title.slice(0, 30)}…」をタスク化`);
  renderActiveTab();
}
function dismissInboxItem(itemId) {
  state.notionInbox = state.notionInbox.filter(i => i.id !== itemId);
  persistNotionInbox();
  renderActiveTab();
}
function clearInbox() {
  if (!confirm('インボックスを全部クリアしますか？タスク化していないものは消えます。')) return;
  state.notionInbox = [];
  persistNotionInbox();
  renderActiveTab();
}

async function notionWriteback(task, completed) {
  const cfg = state.notion;
  if (!cfg.workerUrl || !cfg.apiKey) return;
  if (!task.notionPageId && !task.notionBlockId) return;
  try {
    const res = await fetch(cfg.workerUrl.replace(/\/$/, '') + '/update-task', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': cfg.apiKey },
      body: JSON.stringify({
        notionPageId: task.notionPageId || undefined,
        notionBlockId: task.notionBlockId || undefined,
        completed: !!completed,
      }),
    });
    if (!res.ok) {
      const t = await res.text().catch(() => '');
      throw new Error(`HTTP ${res.status}: ${t.slice(0,120)}`);
    }
    showToast(completed ? 'Notion に完了を反映しました' : 'Notion を未完了に戻しました');
  } catch (e) {
    showToast(`Notion 書き戻し失敗: ${e.message}`);
  }
}

async function notionFetchUsers() {
  const cfg = state.notion;
  if (!cfg.workerUrl || !cfg.apiKey) throw new Error('Worker URL と API キーを Settings で設定してください');
  const res = await fetch(cfg.workerUrl.replace(/\/$/, '') + '/users', {
    method: 'GET',
    headers: { 'X-API-Key': cfg.apiKey },
  });
  if (!res.ok) {
    const t = await res.text().catch(() => '');
    throw new Error(`HTTP ${res.status} ${t.slice(0,120)}`);
  }
  return res.json();
}

async function syncNotion({ silent = false } = {}) {
  const cfg = state.notion;
  if (!cfg.workerUrl || !cfg.apiKey || !cfg.userId) {
    if (!silent) showToast('Notion 設定が未完了です');
    return { added: 0, error: '設定不足' };
  }
  if (!cfg.tasksDatabaseId && !cfg.meetingDatabaseId) {
    if (!silent) showToast('タスク DB または ミーティング DB の ID を入れてください');
    return { added: 0, error: 'DB ID 未設定' };
  }

  if (!silent) showToast('Notion から同期中...');

  let data;
  try {
    const res = await fetch(cfg.workerUrl.replace(/\/$/, '') + '/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': cfg.apiKey },
      body: JSON.stringify({
        tasksDatabaseId: cfg.tasksDatabaseId || undefined,
        meetingDatabaseId: cfg.meetingDatabaseId || undefined,
        userId: cfg.userId,
        since: cfg.lastSync ? cfg.lastSync.slice(0,10) : undefined,
      }),
    });
    if (!res.ok) {
      const t = await res.text().catch(() => '');
      throw new Error(`HTTP ${res.status} ${t.slice(0,200)}`);
    }
    data = await res.json();
  } catch (e) {
    if (!silent) showToast(`同期エラー: ${e.message}`);
    return { added: 0, error: e.message };
  }

  let added = 0;
  let updated = 0;
  const today = todayISO();

  // Import assigned tasks
  for (const nt of (data.tasks || [])) {
    if (!nt.notionPageId || !nt.title) continue;
    const existing = state.tasks.find(t => t.notionPageId === nt.notionPageId);
    if (existing) {
      // Sync completion status
      if (nt.completed && existing.status !== 'completed') {
        existing.status = 'completed';
        existing.completedAt = new Date().toISOString();
        if (!existing.actualHours) existing.actualHours = existing.estimatedHours;
        updated++;
      }
      continue;
    }
    // Skip already-completed tasks (don't import noise)
    if (nt.completed) continue;
    const id = addTask({
      title: nt.title,
      scheduledDate: nt.dueDate || today,
      estimatedHours: 1,
    });
    const t = state.tasks.find(x => x.id === id);
    if (t) {
      t.notionPageId = nt.notionPageId;
      t.notionUrl = nt.url || null;
      t.notionSource = 'task';
    }
    added++;
  }

  // Import meeting note mentions
  for (const m of (data.mentions || [])) {
    if (!m.notionBlockId || !m.text) continue;
    const existing = state.tasks.find(t => t.notionBlockId === m.notionBlockId);
    if (existing) {
      if (m.completed && existing.status !== 'completed') {
        existing.status = 'completed';
        existing.completedAt = new Date().toISOString();
        updated++;
      }
      continue;
    }
    if (m.completed) continue;
    const id = addTask({
      title: m.text.length > 80 ? m.text.slice(0, 80) + '…' : m.text,
      scheduledDate: today,
      estimatedHours: 0.5,
    });
    const t = state.tasks.find(x => x.id === id);
    if (t) {
      t.notionBlockId = m.notionBlockId;
      t.notionPageId = m.notionPageId;
      t.notionUrl = m.pageUrl || null;
      t.notionSource = 'mention';
      t.notionPageTitle = m.pageTitle;
    }
    added++;
  }

  persistTasks();
  state.notion.lastSync = new Date().toISOString();
  persistNotion();

  if (!silent) {
    const errMsg = (data.errors || []).length ? `（一部エラー: ${data.errors.map(e=>e.source).join(', ')}）` : '';
    if (added === 0 && updated === 0) showToast('Notion: 新しい変更はありません' + errMsg);
    else showToast(`Notion から ${added} 件追加 / ${updated} 件更新${errMsg}`);
  }
  renderActiveTab();
  return { added, updated };
}

  state.templates.forEach(tmpl => {
    if (!tmpl.enabled) return;
    anyApplied += applyTemplate(tmpl, today, { autoOnly: true });

    setTimeout(() => showToast(`テンプレートから ${anyApplied} 件のタスクを追加しました`), 600);

function renderTimelineView(tasks) {
  const sorted = tasks.slice().sort((a,b) => (a.order||0) - (b.order||0));
  let cur = 9;
  const items = [];
  for (const t of sorted) {
    if (cur >= 22) break;
    const h = Math.max(0.5, t.estimatedHours || 1);
    const top = (cur - 9) * 50;
    const rawH = h * 50 - 4;
    const remaining = (22 - cur) * 50;
    const height = Math.max(24, Math.min(rawH, remaining - 4));
    items.push({task: t, top, height});
    cur += h;
  }

  const hours = [];
  for (let h = 9; h <= 22; h++) {
    const top = (h - 9) * 50;
    hours.push(`<div class="timeline-hour" style="top:${top}px">${String(h).padStart(2,'0')}:00</div>`);
    if (h < 22) hours.push(`<div class="timeline-line" style="top:${top + 24}px"></div>`);
  }

  return `
    <div class="card">
      <div class="timeline">
        ${tasks.length ? `
          <div class="timeline-grid">
            ${hours.join('')}
            ${items.map(({task, top, height}) => `
              <div class="timeline-task ${task.status==='completed'?'completed':''}" style="top:${top}px; height:${height}px;" data-id="${task.id}">
                <div class="timeline-task-title">${escapeHTML(task.title)}</div>
                <div class="timeline-task-meta">${fmt(task.estimatedHours||1)}h${task.status==='completed'?' ・完了':''}</div>
              </div>
            `).join('')}
          </div>
        ` : '<div class="timeline-empty">タイムラインに表示するタスクがありません。<br>リストモードでタスクを追加してください。</div>'}
      </div>
    </div>
  `;
}

function openProgressSelect(btn, task) {
  const select = document.createElement('select');
  select.className = 'status-select';
  TASK_PROGRESS.forEach(s => {
    const o = document.createElement('option');
    o.value = s.key || '';
    o.textContent = s.dropdown;
    if ((s.key || null) === (task.progress || null)) o.selected = true;
    select.appendChild(o);
  });
  btn.replaceWith(select);
  select.focus();
  if (typeof select.showPicker === 'function') { try { select.showPicker(); } catch {} }
  let done = false;
  const commit = () => {
    if (done) return; done = true;
    task.progress = select.value || null;
    persistTasks();
    renderActiveTab();
  };
  select.addEventListener('change', commit);
  select.addEventListener('blur', commit);
}

function openHoursSelect(btn, task) {
  const opts = [0.5,1,1.5,2,2.5,3,3.5,4,4.5,5,6,7,8];
  const select = document.createElement('select');
  select.className = 'hours-select';
  opts.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = `${fmt(v)}h`;
    if (v === task.estimatedHours) o.selected = true;
    select.appendChild(o);
  });
  btn.replaceWith(select);
  select.focus();
  if (typeof select.showPicker === 'function') {
    try { select.showPicker(); } catch {}
  }
  let done = false;
  const commit = () => {
    if (done) return; done = true;
    task.estimatedHours = parseFloat(select.value);
    persistTasks();
    renderActiveTab();
  };
  select.addEventListener('change', commit);
  select.addEventListener('blur', commit);
}

function editTitleInline(el, task) {
  const input = document.createElement('input');
  input.type = 'text';
  input.value = task.title;
  input.className = 'task-title-input';
  el.replaceWith(input);
  input.focus();
  input.select();
  let done = false;
  const commit = () => {
    if (done) return; done = true;
    const v = input.value.trim();
    if (v) task.title = v;
    persistTasks();
    renderActiveTab();
  };
  const cancel = () => { if (done) return; done = true; renderActiveTab(); };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  });
}

function addTask({title, scheduledDate=null, projectId=null, workType=null, estimatedHours=1}) {
  const task = {
    id: uid(),
    title,
    projectId,
    workType,
    estimatedHours,
    actualHours: 0,
    status: 'pending',
    scheduledDate,
    order: nextOrder(scheduledDate),
    completedAt: null,
    createdAt: new Date().toISOString(),
  };
  state.tasks.push(task);
  persistTasks();
  return task.id;
}

function toggleTask(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  const willComplete = t.status !== 'completed';
  if (willComplete) {
    t.status = 'completed';
    t.completedAt = new Date().toISOString();
    if (!t.actualHours) t.actualHours = t.estimatedHours;
  } else {
    t.status = 'pending';
    t.completedAt = null;
  }
  persistTasks();
  renderActiveTab();
  // Background write-back to Notion if linked
  if (t.notionPageId || t.notionBlockId) {
    notionWriteback(t, willComplete);
  }
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t => t.id !== id);
  persistTasks();
  renderActiveTab();
}

function bindNotesInteractions() {
  $('#noteSubmit')?.addEventListener('click', () => {
    const input = $('#noteInput');
    const sel = $('#noteProject');
    const content = input.value.trim();
    if (!content) return;
    const now = new Date().toISOString();
    state.notes.push({
      id: uid(),
      projectId: sel.value || null,
      content,
      updatedAt: now,
      createdAt: now,
    });
    persistNotes();
    input.value = '';
    renderTasks();
  });

  $$('.note-card').forEach(card => {
    const id = card.dataset.id;
    const note = state.notes.find(n => n.id === id);
    if (!note) return;

    card.addEventListener('click', e => {
      if (e.target.closest('[data-action]') || e.target.closest('[data-edit]')) return;
      state.expandedNoteId = state.expandedNoteId === id ? null : id;
      renderTasks();
    });

    card.querySelector('[data-action="save"]')?.addEventListener('click', e => {
      e.stopPropagation();
      const ta = card.querySelector('[data-edit]');
      note.content = ta.value;
      note.updatedAt = new Date().toISOString();
      persistNotes();
      state.expandedNoteId = null;
      renderTasks();
    });

    card.querySelectorAll('[data-action="to-task"]').forEach(btn => btn.addEventListener('click', e => {
      e.stopPropagation();
      // If expanded, use current textarea content; otherwise use note.content
      const ta = card.querySelector('[data-edit]');
      const source = (state.expandedNoteId === id && ta) ? ta.value : note.content;
      const title = (source || '').trim().split('\n')[0].slice(0, 120);
      if (!title) { showToast('メモが空です'); return; }
      const newId = addTask({title, scheduledDate: null, projectId: note.projectId});
      state.justAddedId = newId;
      state.expandedNoteId = null;
      state.collapsedSomeday = false; // expand someday section so user can see it

/* ============ Calendar tab ============ */
function renderCalendar() {
  const root = $('#tab-calendar');
  const year = state.calendarYear;
  const month = state.calendarMonth;
  const first = new Date(year, month, 1);
  const firstDow = first.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();

  const cells = [];
  for (let i = firstDow - 1; i >= 0; i--) {
    cells.push({date: new Date(year, month-1, daysInPrev - i), otherMonth: true});
  }
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({date: new Date(year, month, d), otherMonth: false});
  }
  while (cells.length < 42) {
    const i = cells.length - firstDow - daysInMonth + 1;
    cells.push({date: new Date(year, month+1, i), otherMonth: true});
  }

  const today = todayISO();
  const dowClass = ['sun','','','','','','sat'];

  root.innerHTML = `
    <div class="card">
      <div class="cal-header">
        <div class="cal-title">${year}年 ${month+1}月</div>
        <div class="cal-nav">
          <button class="cal-today-btn" id="calToday">今日</button>
          <button class="cal-nav-btn" id="calPrev" aria-label="前月">${Icon.chevLeft}</button>
          <button class="cal-nav-btn" id="calNext" aria-label="次月">${Icon.chevRight}</button>
        </div>
      </div>
      <div class="cal-grid">
        ${DAY_LABELS.map((l,i) => `<div class="cal-dow ${dowClass[i]}">${l}</div>`).join('')}
        ${cells.map(({date, otherMonth}) => {
          const iso = isoDate(date);
          const ts = tasksOnDate(iso);
          const doneCount = ts.filter(t => t.status==='completed').length;
          const classes = ['cal-cell'];
          if (otherMonth) classes.push('other-month');
          if (iso === today) classes.push('today');
          if (iso === state.selectedDate) classes.push('selected');
          return `
            <div class="${classes.join(' ')}" data-date="${iso}">
              <div class="cal-cell-num">${date.getDate()}</div>
              ${ts.length ? `<div class="cal-cell-count">${ts.length}件</div>` : ''}
              ${doneCount ? `<div class="cal-cell-dots">${Array.from({length: Math.min(doneCount, 6)}).map(()=>'<span class="cal-cell-dot"></span>').join('')}</div>` : ''}
            </div>
          `;
        }).join('')}
      </div>
      ${renderCalDayPanel()}
    </div>
  `;

  $('#calPrev').addEventListener('click', () => {
    if (state.calendarMonth === 0) { state.calendarMonth = 11; state.calendarYear--; }
    else state.calendarMonth--;
    renderCalendar();
  });
  $('#calNext').addEventListener('click', () => {
    if (state.calendarMonth === 11) { state.calendarMonth = 0; state.calendarYear++; }
    else state.calendarMonth++;
    renderCalendar();
  });
  $('#calToday').addEventListener('click', () => {
    const t = new Date();
    state.calendarYear = t.getFullYear();
    state.calendarMonth = t.getMonth();
    state.selectedDate = todayISO();
    renderCalendar();
  });
  $$('.cal-cell').forEach(c => c.addEventListener('click', () => {
    state.selectedDate = c.dataset.date;
    renderCalendar();
  }));

  bindCalendarDayPanelInteractions();
}

function renderCalDayPanel() {
  if (!state.selectedDate) {
    return `<div class="cal-day-panel"><div class="cal-day-panel-empty">日付を選択するとタスクが表示されます</div></div>`;
  }
  const iso = state.selectedDate;
  const ts = tasksOnDate(iso);
  const totalEst = ts.reduce((s,t)=>s+(t.estimatedHours||0),0);
  const doneEst = ts.filter(t=>t.status==='completed').reduce((s,t)=>s+(t.estimatedHours||0),0);
  return `
    <div class="cal-day-panel">
      <div class="cal-day-panel-header">
        <div class="cal-day-panel-title">${formatDateJP(iso)}</div>
        <div class="cal-day-panel-meta">${fmt(doneEst)}h / ${fmt(totalEst)}h ・ ${ts.filter(t=>t.status==='completed').length}/${ts.length}件</div>
      </div>
      ${ts.length ? `<ul class="cal-day-list">${ts.map(t => taskRowHTML(t)).join('')}</ul>` : '<div class="cal-day-panel-empty">この日のタスクはありません</div>'}
      <div class="inline-add" data-add-date="${iso}" style="margin-top:6px;">
        <input type="text" class="inline-add-input" placeholder="＋ ${formatDateJP(iso)} にタスクを追加" />
      </div>
    </div>
  `;
}

function bindCalendarDayPanelInteractions() {
  const panel = $('.cal-day-panel');
  if (!panel) return;
  $$('.task-row', panel).forEach(row => {
    const id = row.dataset.id;
    const task = state.tasks.find(t => t.id === id);
    if (!task) return;
    row.querySelector('[data-action="toggle"]')?.addEventListener('click', e => { e.stopPropagation(); toggleTask(id); });
    row.querySelector('[data-action="delete"]')?.addEventListener('click', e => { e.stopPropagation(); deleteTask(id); });
    row.querySelector('[data-action="hours"]')?.addEventListener('click', e => { e.stopPropagation(); openHoursSelect(e.currentTarget, task); });
    row.querySelector('[data-action="status"]')?.addEventListener('click', e => { e.stopPropagation(); openProgressSelect(e.currentTarget, task); });
    row.querySelector('[data-action="edit"]')?.addEventListener('click', e => { e.stopPropagation(); editTitleInline(e.currentTarget, task); });
  });
  $$('.inline-add-input', panel).forEach(input => {
    input.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      const title = input.value.trim();
      if (!title) return;
      const dateAttr = input.closest('[data-add-date]').dataset.addDate;
      addTask({title, scheduledDate: dateAttr || null});
      input.value = '';
      renderCalendar();
    });
  });
}
