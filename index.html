      const i = Number(b.dataset.taskI);
      const preset = b.dataset.preset;
      const task = tmpl.tasks[i];
      if (!task) return;
      if (preset === 'daily') task.weekdays = [0,1,2,3,4,5,6];
      else if (preset === 'weekdays') task.weekdays = [1,2,3,4,5];
      else if (preset === 'none') task.weekdays = [];
      // Update pill UI for this task only (no full re-render — preserves focus)
      const card = b.closest('.tmpl-task-card');
      if (card) {
        card.querySelectorAll('.weekday-pill').forEach(p => {
          const d = Number(p.dataset.dow);
          p.classList.toggle('active', task.weekdays.includes(d));
        });
      }
    }));

    $('#tmplSave').addEventListener('click', () => {
      syncFromDOM();
      const name = (tmpl.name || '').trim();
      if (!name) { alert('テンプレート名を入力してください'); return; }
      tmpl.name = name;
      tmpl.tasks = tmpl.tasks
        .map(t => ({...t, title: (t.title || '').trim()}))
        .filter(t => t.title);
      if (!tmpl.tasks.length) { alert('タスクを 1 件以上追加してください'); return; }

      if (isNew) {
        state.templates.push(tmpl);
      } else {
        const idx = state.templates.findIndex(t => t.id === tmpl.id);
        if (idx >= 0) state.templates[idx] = tmpl;
      }
      persistTemplates();
      close();
      renderActiveTab();
      showToast(isNew ? 'テンプレートを追加しました' : 'テンプレートを保存しました');
    });
  };

  const close = () => overlay.classList.remove('open');
  render();
  overlay.classList.add('open');
  setTimeout(() => $('#tmplName')?.focus(), 50);
}

// Click outside template modal to close
$('#templateModal').addEventListener('click', e => {
  if (e.target.id === 'templateModal') $('#templateModal').classList.remove('open');
});

/* ============ Review modal ============ */
function maybeShowReview() {
  const today = todayISO();
  if (loadStr(KEYS.lastReview, '') === today) return;
  const yesterday = isoDate(new Date(Date.now() - 86400000));
  const yTasks = tasksOnDate(yesterday);
  if (!yTasks.length) return;
  if (state.reviews.find(r => r.date === yesterday)) return;
  openReview(yesterday);
}

function openReview(date) {
  const inner = $('#reviewModalInner');
  const overlay = $('#reviewModal');

  const render = () => {
    const t = tasksOnDate(date);
    const done = t.filter(x => x.status==='completed');
    const totalEst = t.reduce((s,x)=>s+(x.estimatedHours||0),0);
    const doneEst = done.reduce((s,x)=>s+(x.estimatedHours||0),0);

    inner.innerHTML = `
      <div class="modal-header">
        <div class="modal-title">${formatDateJP(date)} の振り返り</div>
        <button class="modal-close" id="reviewClose" aria-label="閉じる">${Icon.x}</button>
      </div>
      <div class="modal-body">
        <div class="modal-summary">完了 ${done.length}/${t.length}件 ・ ${fmt(doneEst)}h / ${fmt(totalEst)}h</div>
        ${t.map(task => `
          <div class="modal-task-row">
            <div class="modal-task-status ${task.status==='completed'?'done':''}">${Icon.check}</div>
            <div class="modal-task-title ${task.status==='completed'?'done':''}">${escapeHTML(task.title)}</div>
            <div class="modal-task-hours">${fmt(task.estimatedHours||0)}h</div>
            ${task.status!=='completed' ? `<button class="modal-task-action" data-mark="${task.id}">完了に</button>` : ''}
          </div>
        `).join('')}
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="reviewSkip">スキップ</button>
        <button class="btn btn-primary" id="reviewDone">完了</button>
      </div>
    `;

    $('#reviewClose').addEventListener('click', closeReview);
    $('#reviewSkip').addEventListener('click', () => {
      saveStr(KEYS.lastReview, todayISO());
      closeReview();
    });
    $('#reviewDone').addEventListener('click', () => {
      const t2 = tasksOnDate(date);
      state.reviews.push({
        id: uid(),
        date,
        completedCount: t2.filter(x=>x.status==='completed').length,
        totalCount: t2.length,
        createdAt: new Date().toISOString(),
      });
      persistReviews();
      saveStr(KEYS.lastReview, todayISO());
      closeReview();
      renderActiveTab();
    });
    $$('[data-mark]').forEach(b => b.addEventListener('click', () => {
      const id = b.dataset.mark;
      const task = state.tasks.find(x => x.id === id);
      if (!task) return;
      task.status = 'completed';
      task.actualHours = task.estimatedHours;
      task.completedAt = new Date().toISOString();
      persistTasks();
      render();
    }));
  };

  render();
  overlay.classList.add('open');
}

function closeReview() {
  $('#reviewModal').classList.remove('open');
}

window.demoOpenReview = function() {
  const yesterday = isoDate(new Date(Date.now() - 86400000));
  const yTasks = tasksOnDate(yesterday);
  if (yTasks.length) { openReview(yesterday); return; }
  const tTasks = tasksOnDate(todayISO());
  if (tTasks.length) { openReview(todayISO()); return; }
  alert('振り返り対象のタスクがありません。タスクを追加してからお試しください。');
};

$('#reviewModal').addEventListener('click', e => {
  if (e.target.id === 'reviewModal') closeReview();
});

/* ============ Firebase sync ============ */
let _syncingFromRemote = false;
let _syncTimer = null;
let _unsubscribe = null;
let _firebaseReady = false;

function scheduleSync() {
  if (_syncingFromRemote) return;
  if (!_firebaseReady || !window._fb || !window._fb.user) return;
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncStateToFirestore, 500);
}

async function syncStateToFirestore() {
  if (!window._fb?.user) return;
  const data = {
    tasks: state.tasks,
    projects: state.projects,
    workTypes: state.workTypes,
    notes: state.notes,
    reviews: state.reviews,
    templates: state.templates,
    notion: state.notion,
    notionInbox: state.notionInbox,
    updatedAt: window._fb.serverTimestamp(),
    clientId: getClientId(),
  };
  try {
    await window._fb.setDoc(
      window._fb.doc(window._fb.db, 'users', window._fb.user.uid, 'state', 'main'),
      data
    );
  } catch (e) {
    console.error('Firestore sync failed:', e);
  }
}

function getClientId() {
  let id = localStorage.getItem('taskdock_clientId');
  if (!id) {
    id = uid();
    localStorage.setItem('taskdock_clientId', id);
  }
  return id;
}

function applyRemoteState(data) {
  _syncingFromRemote = true;
  try {
    if (Array.isArray(data.tasks))     { state.tasks     = data.tasks;     saveJSON(KEYS.tasks, state.tasks); }
    if (Array.isArray(data.projects))  { state.projects  = data.projects;  saveJSON(KEYS.projects, state.projects); }
    if (Array.isArray(data.workTypes)) { state.workTypes = data.workTypes; saveJSON(KEYS.workTypes, state.workTypes); }
    if (Array.isArray(data.notes))     { state.notes     = data.notes;     saveJSON(KEYS.notes, state.notes); }
    if (Array.isArray(data.reviews))   { state.reviews   = data.reviews;   saveJSON(KEYS.reviews, state.reviews); }
    if (Array.isArray(data.templates)) { state.templates = data.templates; saveJSON(KEYS.templates, state.templates); }
    if (data.notion && typeof data.notion === 'object') {
      state.notion = {...DEFAULT_NOTION_CONFIG, ...data.notion};
      saveJSON(KEYS.notion, state.notion);
    }
    if (Array.isArray(data.notionInbox)) {
      state.notionInbox = data.notionInbox;
      saveJSON(KEYS.notionInbox, state.notionInbox);
    }
    renderActiveTab();
  } finally {
    _syncingFromRemote = false;
  }
}

async function onSignedIn(user) {
  window._fb.user = user;
  hideAuthOverlay();
  showAuthBadge(user);

  const docRef = window._fb.doc(window._fb.db, 'users', user.uid, 'state', 'main');
  // 1) First-load: check if remote exists
  try {
    const snap = await window._fb.getDoc(docRef);
    if (snap.exists()) {
      const remote = snap.data();
      // If remote has data and local is empty (new device), pull remote
      // If both have data, prefer remote (it's the canonical store)
      const localHasData = state.tasks.length || state.projects.length || state.notes.length;
      if (!localHasData) {
        applyRemoteState(remote);
        showToast('クラウドからデータを取得しました');
      } else if (remote.clientId && remote.clientId !== getClientId()) {
        // Remote is from a different device → ask
        const useRemote = confirm('クラウドに別デバイスのデータがあります。\n\n「OK」: クラウドのデータを使う（この端末のローカルは上書き）\n「キャンセル」: この端末のデータをクラウドに上書き');
        if (useRemote) {
          applyRemoteState(remote);
          showToast('クラウドのデータに切り替えました');
        } else {
          await syncStateToFirestore();
          showToast('この端末のデータをクラウドに保存しました');
        }
      } else {
        // Same device or merge - just take remote
        applyRemoteState(remote);
      }
    } else {
      // First time → push local
      await syncStateToFirestore();
      showToast('クラウドに保存しました');
    }
  } catch (e) {
    console.error('Initial sync error:', e);
  }

  // 2) Start real-time listener
  if (_unsubscribe) _unsubscribe();
  _unsubscribe = window._fb.onSnapshot(docRef, (snap) => {
    if (!snap.exists()) return;
    const data = snap.data();
    // Ignore our own writes
    if (data.clientId === getClientId()) return;
    applyRemoteState(data);
    showToast('別の端末から更新を受信しました');
  });
}

function onSignedOut() {
  window._fb.user = null;
  if (_unsubscribe) { _unsubscribe(); _unsubscribe = null; }
  hideAuthBadge();
  showAuthOverlay();
}

/* ============ Auth UI ============ */
function showAuthOverlay() {
  let el = document.getElementById('authOverlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'authOverlay';
    el.className = 'auth-overlay';
    el.innerHTML = `
      <div class="auth-card">
        <img src="kotomusubi.png" alt="" style="height:60px;width:auto;margin-bottom:6px;">
        <div class="auth-title">KotoTask にログイン</div>
        <div class="auth-sub">ログインするとMacとiPhoneでタスクが同期されます</div>
        <button class="btn btn-primary auth-btn" id="authGoogle">
          <svg viewBox="0 0 18 18" width="14" height="14" style="margin-right:8px;">
            <path fill="#4285f4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/>
            <path fill="#34a853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.83.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.32A9 9 0 0 0 9 18z"/>
            <path fill="#fbbc05" d="M3.97 10.71A5.41 5.41 0 0 1 3.68 9c0-.6.1-1.17.29-1.71V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.04l3.01-2.33z"/>
            <path fill="#ea4335" d="M9 3.58c1.32 0 2.5.46 3.44 1.35l2.58-2.59C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.96l3.01 2.33C4.68 5.18 6.66 3.58 9 3.58z"/>
          </svg>
          Google でログイン
        </button>
        <div class="auth-divider"><span>または</span></div>
        <input type="email" id="authEmail" class="auth-input" placeholder="メールアドレス" autocomplete="email" />
        <button class="btn btn-outline auth-btn" id="authEmailLink">メールリンクを送る</button>
        <div class="auth-note">※メールリンク方式は、入力したメアドにログイン用 URL が送られます。スマホでメール開いて URL をタップ → 同じアカウントでログイン</div>
      </div>
    `;
    document.body.appendChild(el);

    $('#authGoogle').addEventListener('click', signInGoogle);
    $('#authEmailLink').addEventListener('click', signInEmail);
  }
  el.classList.add('open');
}

function hideAuthOverlay() {
  const el = document.getElementById('authOverlay');
  if (el) el.classList.remove('open');
}

function showAuthBadge(user) {
  let el = document.getElementById('authBadge');
  if (!el) {
    el = document.createElement('button');
    el.id = 'authBadge';
    el.className = 'auth-badge';
    el.title = 'ログアウト';
    document.querySelector('.header-inner').appendChild(el);
    el.addEventListener('click', () => {
      if (confirm(`${user.displayName || user.email} でログイン中。\nログアウトしますか？（データはクラウドに残ります）`)) {
        signOutUser();
      }
    });
  }
  const initial = (user.displayName || user.email || 'U')[0].toUpperCase();
  el.textContent = initial;
  el.style.display = 'flex';
}

function hideAuthBadge() {
  const el = document.getElementById('authBadge');
  if (el) el.style.display = 'none';
}

async function signInGoogle() {
  if (!window._fb) return;
  const btn = document.getElementById('authGoogle');
  if (btn) btn.disabled = true;
  try {
    const provider = new window._fb.GoogleAuthProvider();
    await window._fb.signInWithPopup(window._fb.auth, provider);
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user' && e.code !== 'auth/cancelled-popup-request') {
      alert('Google ログイン失敗: ' + (e.message || e.code));
    }
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function signInEmail() {
  const emailInput = document.getElementById('authEmail');
  const email = (emailInput.value || '').trim();
  if (!email || !email.includes('@')) {
    alert('正しいメールアドレスを入力してください');
    emailInput.focus();
    return;
  }
  const btn = document.getElementById('authEmailLink');
  btn.disabled = true;
  try {
    await window._fb.sendSignInLinkToEmail(window._fb.auth, email, {
      url: location.origin + location.pathname,
      handleCodeInApp: true,
    });
    localStorage.setItem('taskdock_emailForSignIn', email);
    alert(`${email} にログイン用のリンクを送りました。\nメールを開いて URL をタップしてください。`);
  } catch (e) {
    alert('メール送信失敗: ' + (e.message || e.code));
  } finally {
    btn.disabled = false;
  }
}

async function signOutUser() {
  try {
    await window._fb.signOut(window._fb.auth);
  } catch (e) {
    console.error(e);
  }
}

async function handleEmailLinkReturn() {
  if (!window._fb.isSignInWithEmailLink(window._fb.auth, location.href)) return;
  let email = localStorage.getItem('taskdock_emailForSignIn');
  if (!email) {
    email = prompt('ログインに使うメールアドレスを入力してください');
    if (!email) return;
  }
  try {
    await window._fb.signInWithEmailLink(window._fb.auth, email, location.href);
    localStorage.removeItem('taskdock_emailForSignIn');
    // Clean URL
    history.replaceState(null, '', location.pathname);
  } catch (e) {
    alert('メールリンクログイン失敗: ' + (e.message || e.code));
  }
}

function setupAuth() {
  _firebaseReady = true;
  // Listen for auth changes
  window._fb.onAuthStateChanged(window._fb.auth, (user) => {
    if (user) onSignedIn(user);
    else onSignedOut();
  });
  // Handle email link return
  handleEmailLinkReturn();
}

if (window._fb) setupAuth();
else window.addEventListener('firebase-loaded', setupAuth);

function maybeAskNotionIdentity() {
  if (state.notion.identityAsked) return;
  setTimeout(() => showNotionIdentityModal(), 1200);
}

function showNotionIdentityModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.id = '_identityModal';
  overlay.innerHTML = `
    <div class="modal" style="max-width:380px;">
      <div class="modal-header">
        <div class="modal-title">あなたは誰？</div>
      </div>
      <div class="modal-body" style="padding-top:8px;">
        <div style="font-size:12px;color:var(--gray-600);line-height:1.6;margin-bottom:14px;">
          Notion 連携で、自分の担当タスクだけ取り込めるようにします。<br>
          Notion 上のあなたを選んでください（後で Settings から変更可）。
        </div>
        <select id="_identitySelect" style="width:100%;border:1px solid var(--gray-200);border-radius:7px;padding:9px 11px;font-size:13px;background:var(--gray-50);outline:none;font-family:inherit;">
          <option value="">-- 選択してください --</option>
          ${NOTION_TEAM_MEMBERS.map(m => `<option value="${m.id}">${escapeHTML(m.name)}</option>`).join('')}
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="_identitySkip">スキップ</button>
        <button class="btn btn-primary" id="_identitySave">保存</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('_identitySkip').addEventListener('click', () => {
    state.notion.identityAsked = true;
    persistNotion();
    overlay.remove();
  });
  document.getElementById('_identitySave').addEventListener('click', () => {
    const id = document.getElementById('_identitySelect').value;
    const member = NOTION_TEAM_MEMBERS.find(m => m.id === id);
    if (!member) { alert('選択してください（スキップなら下のキャンセル）'); return; }
    state.notion.userId = member.id;
    state.notion.userName = member.name;
    state.notion.identityAsked = true;
    if (!state.notion.tasksDatabaseId) state.notion.tasksDatabaseId = NOTION_DEFAULT_DB_ID;
    persistNotion();
    overlay.remove();
    showToast(`${member.name} として保存しました`);
  });
}

/* ============ Init ============ */
function init() {
  // Migrate: ensure default DB ID is set for existing users
  if (!state.notion.tasksDatabaseId) {
    state.notion.tasksDatabaseId = NOTION_DEFAULT_DB_ID;
    saveJSON(KEYS.notion, state.notion);
  }
  migrateTemplates();
  checkAutoApplyTemplates();
  renderNav();
  renderActiveTab();
  maybeShowReview();
  maybeAskNotionIdentity();
  // Auto Notion sync (background, non-blocking)
  if (state.notion.autoSync && state.notion.workerUrl && state.notion.apiKey && state.notion.userId) {
    setTimeout(() => syncNotion({ silent: false }), 800);
  }
}
init();
